---
services:
  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/lidarr:/config
      - /mnt/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    ports:
      - 8686:8686