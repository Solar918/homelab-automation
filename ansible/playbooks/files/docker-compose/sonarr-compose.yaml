---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/sonarr:/config
      - /mnt/media:/media
    ports:
      - 8989:8989