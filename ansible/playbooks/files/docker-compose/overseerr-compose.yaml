---
version: '3'

services:
  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Pacific/Auckland
      - PORT=5055 # optional
    ports:
      - 5055:5055
    volumes:
      - /opt/overseerr/config:/app/config
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
