- name: Copy local SSH keys to Proxmox hosts
  hosts: proxmox01, proxmox02
  gather_facts: false

  tasks:
    - name: Ensure SSH key is deployed to authorized_keys
      ansible.posix.authorized_key:
        user: "{{ ansible_user | default('root') }}"
        state: present
        # Falls back to id_rsa if id_ed25519 is not found
        key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub', errors='ignore') | default(lookup('file', lookup('env', 'HOME') + '/.ssh/id_rsa.pub', errors='ignore'), true) }}"
