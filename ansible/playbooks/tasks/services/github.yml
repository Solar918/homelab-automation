- name: Update apt cache
  apt:
    update_cache: yes

- name: Upgrade OpenSSH client and server
  apt:
    name:
      - openssh-client
      - openssh-server
      - openssh-sftp-server
      - openssl
      - libssl3
    state: latest

- name: Ensure git is installed
  apt:
    name: git
    state: present
    update_cache: yes

- name: Ensure .ssh directory exists
  file:
    path: /home/{{ ansible_user }}/.ssh
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Install private SSH key (ed25519)
  copy:
    src: ../files/id_ed25519
    dest: /home/{{ ansible_user }}/.ssh/id_ed25519
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    force: yes
    remote_src: no

- name: Install public SSH key
  copy:
    src: ../files/id_ed25519.pub
    dest: /home/{{ ansible_user }}/.ssh/id_ed25519.pub
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
    force: yes
    remote_src: no

- name: Add GitHub to known_hosts
  known_hosts:
    path: /home/{{ ansible_user }}/.ssh/known_hosts
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"

- name: Ensure SSH config for GitHub exists
  copy:
    dest: /home/{{ ansible_user }}/.ssh/config
    content: |
      Host github.com
          HostName github.com
          User git
          IdentityFile /home/{{ ansible_user }}/.ssh/id_ed25519
          IdentitiesOnly yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'