- name: Check if Bazarr is installed
  stat:
    path: /opt/bazarr
  register: bazarr_installed

- name: Create Bazarr directory
  file:
    path: /opt/bazarr
    state: directory
    mode: '0755'
  when: not bazarr_installed.stat.exists

- name: Copy Bazarr docker-compose file
  copy:
    src: ../../../../files/docker-compose/bazarr-compose.yaml
    dest: /opt/bazarr/docker-compose.yaml
    mode: '0644'
  when: not bazarr_installed.stat.exists

- name: Run Bazarr container
  shell: docker compose up -d
  args:
    chdir: /opt/bazarr
  when: not bazarr_installed.stat.exists
