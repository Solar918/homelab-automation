# need when tag thingy for things that only need to be done once

- name: Check if Bazarr is installed
  stat:
    path: /opt/bazarr
  register: bazarr_installed

- name: Install Bazarr dependencies
  apt:
    name:
      - 7zip
      - python3-dev
      - python3-pip
      - python3-distutils
      - unrar
      - unzip
    state: present
    update_cache: yes

- name: Create Bazarr user
  user:
    name: bazarr
    system: yes
    create_home: no

- name: Create Media group
  group:
    name: media
    state: present

- name: Add Bazarr user to Media group
  user:
    name: bazarr
    groups: media
    append: yes
# * Your download clients and media server run as and are a part of the group media
# * Your paths used by your download clients and media server are accessible (read/write) to the group media

- name: Create Bazarr config directory
  file:
    path: /opt/bazarr
    state: directory
    owner: bazarr
    group: media
    mode: '0755'

- name: Download the correct binaries
  get_url:
    url: "https://github.com/morpheus65535/bazarr/releases/latest/download/bazarr.zip"
    dest: /tmp/
    mode: '0644'
  when: not bazarr_installed.stat.exists

- name: Unzip Bazarr files
  unarchive:
    src: /tmp/bazarr.zip
    dest: /opt/bazarr
    remote_src: yes
  when: not bazarr_installed.stat.exists

- name: Install Python packages from requirements.txt
  pip:
    requirements: /opt/bazarr/requirements.txt
    executable: /usr/bin/pip3
  become: true
  when: not bazarr_installed.stat.exists

- name: Set ownership of Bazarr files
  file:
    path: /opt/bazarr
    state: directory
    owner: bazarr
    group: bazarr
    recurse: yes

- name: Create Bazarr systemd service file
  copy:
    src: ../../../files/service-files/bazarr.service
    dest: /etc/systemd/system/bazarr.service
    owner: root
    group: root
    mode: '0644'
    force: yes
    remote_src: no

- name: Reload systemd daemon
  command: systemctl daemon-reload
  become: true

- name: Enable and start Bazarr service
  systemd:
    name: bazarr
    enabled: true
    state: started
  become: true