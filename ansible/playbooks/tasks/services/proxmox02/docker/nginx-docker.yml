- name: Check if NPM is installed
  stat:
    path: /opt/npm
  register: npm_installed

- name: Create NPM directory
  file:
    path: /opt/npm
    state: directory
    mode: '0755'
  when: not npm_installed.stat.exists

- name: Copy NPM docker-compose file
  copy:
    src: ../../../../files/docker-compose/npm-compose.yaml
    dest: /opt/npm/docker-compose.yaml
    mode: '0644'
  when: not npm_installed.stat.exists

- name: Run NPM container
  shell: docker compose up -d
  args:
    chdir: /opt/npm
  when: not npm_installed.stat.exists