- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Add Cloudflared GPG key
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflare-public-v2.gpg
    dest: /usr/share/keyrings/cloudflare-public-v2.gpg
    mode: '0644'

- name: Add Cloudflare repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/cloudflared.list
    content: |
      deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main
    mode: '0644'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install cloudflared
  ansible.builtin.apt:
    name: cloudflared
    state: present
