- name: Download Docker install script
  get_url:
    url: https://get.docker.com
    dest: /tmp/get-docker.sh
    mode: '0755'

- name: Run Docker install script
  command: sh /tmp/get-docker.sh
  become: true

- name: Ensure Python dependencies for Ansible Docker modules are installed
  apt:
    name:
      - python3-requests
      - python3-packaging
      - python3-setuptools
      - python3-wheel
    state: present
    update_cache: yes

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add admin user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes