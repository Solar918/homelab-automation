- name: Set CT {{ ct.ctid }} to use apparmour profile
  delegate_to: "{{ pve_host_aliases[ct.node] }}"
  become: yes
  lineinfile:
    path: "/etc/pve/lxc/{{ ct.ctid }}.conf"
    regexp: '^lxc.apparmor.profile:'
    line: "lxc.apparmor.profile: unconfined"
    create: yes

- name: Set CT {{ ct.ctid }} to use cgroup devices allow all
  delegate_to: "{{ pve_host_aliases[ct.node] }}"
  become: yes
  lineinfile:
    path: "/etc/pve/lxc/{{ ct.ctid }}.conf"
    regexp: '^lxc.cgroup.devices.allow:'
    line: "lxc.cgroup.devices.allow: a"
    create: yes

- name: Set CT {{ ct.ctid }} to drop all capabilities
  delegate_to: "{{ pve_host_aliases[ct.node] }}"
  become: yes
  lineinfile:
    path: "/etc/pve/lxc/{{ ct.ctid }}.conf"
    regexp: '^lxc.cap.drop:'
    line: 'lxc.cap.drop:'
    create: yes